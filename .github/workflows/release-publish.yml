name: Publish Python Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install release tooling and runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          # The release gate runs the AgentMemory test suite, so it needs the
          # project's test dependencies in addition to the runtime package set.
          python -m pip install -r requirements-dev.txt

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          version="$(python -c "from pathlib import Path; ns = {}; exec(Path('src/mnemocore/_version.py').read_text(), ns); print(ns['__version__'])")"
          test "${GITHUB_REF_NAME}" = "v${version}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Run AgentMemory release smoke
        env:
          PYTHONPATH: src
        run: python scripts/ops/agent_memory_release_smoke.py

      - name: Run AgentMemory release test suite
        run: |
          python -m pytest tests/agent_memory tests/integrations \
            benchmarks/test_agent_memory_baseline.py \
            benchmarks/test_benchmark_smoke.py -q

      - name: Build and validate distributions
        run: |
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      # Configure PyPI Trusted Publishing for this workflow/environment to
      # remove the password input and retire PYPI_API_TOKEN.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  huggingface:
    name: Sync release material to Hugging Face
    needs: [build, pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upload release documentation and distributions
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          python -m pip install --upgrade huggingface_hub
          printf 'version=%s\ntag=%s\ngithub_release=%s\npypi=https://pypi.org/project/mnemocore/%s/\n' \
            "$RELEASE_VERSION" "$RELEASE_TAG" "${{ github.event.release.html_url }}" "$RELEASE_VERSION" \
            > RELEASE_METADATA.txt
          hf upload Granis87/MnemoCore README.md README.md --repo-type model
          hf upload Granis87/MnemoCore CHANGELOG.md CHANGELOG.md --repo-type model
          hf upload Granis87/MnemoCore RELEASE_METADATA.txt releases/${RELEASE_TAG}/RELEASE_METADATA.txt --repo-type model
          hf upload Granis87/MnemoCore dist releases/${RELEASE_TAG}/dist --repo-type model
