[project.urls]
Homepage = "https://github.com/RobinALG87/MnemoCore-Persistent-Cognitive-Ai-Memory"
Repository = "https://github.com/RobinALG87/MnemoCore-Persistent-Cognitive-Ai-Memory"
"Bug Tracker" = "https://github.com/RobinALG87/MnemoCore-Persistent-Cognitive-Ai-Memory/issues"

[project.scripts]
mnemocore = "mnemocore.api.entrypoint:main"
mnemocore-cli = "mnemocore.cli.entrypoint:main"
mnemocore-benchmark = "benchmarks.entrypoint:main"

[tool.hatch.version]
path = "src/mnemocore/_version.py"

# ── Hatchling build configuration ─────────────────────────────────────────────
[tool.hatch.build.targets.wheel]
packages = ["src/mnemocore", "benchmarks"]
exclude = [
    "benchmarks/agent_memory_baseline.py",
    "benchmarks/bench_*.py",
    "benchmarks/pytest_benchmarks.py",
    "benchmarks/test_*.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "benchmarks/",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
    "config.yaml",
]

# ── Pytest ─────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
markers = [
    "benchmark: marks tests as benchmarks (deselect with '-m \"not benchmark\"')",
    "regression: marks tests as regression tests",
    "slo: marks tests as SLO (Service Level Objective) tests",
    "integration: marks tests requiring external services (Redis, Qdrant)",
    "slow: marks tests as slow-running (enable with '--run-slow')",
    "requires_redis: marks tests requiring a running Redis instance",
    "requires_qdrant: marks tests requiring a running Qdrant instance",
]

# ── Coverage ───────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "**/__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
